name: Build Windows binary

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --locked --release --target x86_64-pc-windows-msvc

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "target\x86_64-pc-windows-msvc\release\beihang-login.exe" dist\
          Copy-Item "account.json.example" dist\
          Copy-Item "README.md" dist\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beihang-login-windows-x86_64-msvc
          path: dist/*
          if-no-files-found: error
